<!DOCTYPE html>
<html>
<head>
  <title>Local GGUF Agent</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      background: #f7f7f7;
    }

    .chat-panel {
      width: 20%;
      background: white;
      border-right: 1px solid #ddd;
      padding: 16px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }

    .output-panel {
      width: 80%;
      padding: 20px;
      box-sizing: border-box;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      border: 1px solid #ddd;
      background: #fafafa;
      padding: 10px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .message {
      margin-bottom: 12px;
      line-height: 1.4;
    }

    textarea {
      width: 100%;
      height: 90px;
      resize: none;
      box-sizing: border-box;
      padding: 8px;
    }

    button {
      cursor: pointer;
    }

    .send-button {
      margin-top: 8px;
      width: 100%;
      padding: 10px;
      background: #222;
      color: white;
      border: none;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab-button {
      padding: 10px 16px;
      border: 1px solid #ccc;
      background: white;
    }

    .tab-button.active {
      background: #222;
      color: white;
    }

    .tab-content {
      background: white;
      border: 1px solid #ddd;
      padding: 20px;
      min-height: 600px;
      white-space: pre-wrap;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="chat-panel">
    <h3>Chat</h3>

    <div id="messages" class="messages"></div>

    <textarea id="userInput" placeholder="Ask the agent..."></textarea>
    <button class="send-button" onclick="sendMessage()">Send</button>
  </div>

  <div class="output-panel">
    <h2>Agent Output</h2>

    <div id="tabs" class="tabs"></div>

    <div id="tabContent" class="tab-content">
      Ask something in the chat panel to generate output tabs.
    </div>
  </div>

  <script>
    let currentTabs = {};
    let activeTab = "";

    function addMessage(role, text) {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");

      div.className = "message";
      div.innerHTML = "<b>" + role + ":</b><br>" + text;

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function renderTabs(tabs) {
      currentTabs = tabs;

      const tabsDiv = document.getElementById("tabs");
      tabsDiv.innerHTML = "";

      const keys = Object.keys(tabs);

      if (keys.length === 0) {
        document.getElementById("tabContent").textContent = "No tabs returned.";
        return;
      }

      activeTab = keys[0];

      keys.forEach(function(key) {
        const button = document.createElement("button");
        button.className = "tab-button";
        button.textContent = tabs[key].title;

        button.onclick = function() {
          activeTab = key;
          updateActiveTab();
        };

        tabsDiv.appendChild(button);
      });

      updateActiveTab();
    }

    function updateActiveTab() {
      const buttons = document.querySelectorAll(".tab-button");

      buttons.forEach(function(button) {
        button.classList.remove("active");

        if (button.textContent === currentTabs[activeTab].title) {
          button.classList.add("active");
        }
      });

      document.getElementById("tabContent").textContent =
        currentTabs[activeTab].content;
    }

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value.trim();

      if (!message) {
        return;
      }

      addMessage("You", message);
      input.value = "";

      addMessage("Agent", "Analyzing...");

      const response = await fetch("/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: message })
      });

      const data = await response.json();

      const messages = document.getElementById("messages");
      messages.lastChild.remove();

      addMessage("Agent", data.chat_response);
      renderTabs(data.tabs);
    }
  </script>
</body>
</html>
